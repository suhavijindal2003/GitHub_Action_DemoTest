name: Node CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Workflow Started
        run: echo "Workflow is RUNNING..."

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."
          npm install

      - name: Run Tests
        run: |
          echo "Running tests..."
          npm test

      # ✅ Runs only if everything passed
      - name: ✅ Success Message
        if: success()
        run: echo "Workflow SUCCESS 🎉"

      # ❌ Runs only if something failed
      - name: ❌ Failure Message
        if: failure()
        run: echo "Workflow FAILED ❌"
