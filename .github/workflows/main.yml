name: Node CI Pipeline

on: push

jobs:
  build:
    runs-on: windows-latest   # ✅ changed from ubuntu to windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
