name: QA Test Pipeline
on:
  push:
    branches: ["main"]
jobs:
  qa-test:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧪 Execute Test Cases
        run: npm test

      - name: 📊 Test Summary
        if: always()
        run: echo "Check logs above for detailed test case execution"

      - name: ✅ Success
        if: success()
        run: echo "All test cases passed"

      - name: ❌ Failure
        if: failure()
        run: echo "Some test cases failed"
